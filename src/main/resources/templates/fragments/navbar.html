<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar">
    <a class="brand" th:href="@{/}">StayEasy</a>
    <div class="links">
        <a th:href="@{/rooms}">Browse Rooms</a>

        <span sec:authorize="isAuthenticated()">
            <a sec:authorize="hasAnyRole('GUEST','HOST','ADMIN')" th:href="@{/bookings/my}">My Bookings</a>
            <a sec:authorize="hasAnyRole('HOST','ADMIN')" th:href="@{/rooms/my}">My Rooms</a>
            <a sec:authorize="hasAnyRole('HOST','ADMIN')" th:href="@{/rooms/new}">+ Add Room</a>
        </span>

        <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
            <a class="btn btn-primary" th:href="@{/register}">Sign Up</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-secondary">Logout</button>
            </form>
        </span>
    </div>
</nav>
</body>
</html>
