<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up — StayEasy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="form-card">
        <h2>Create an account</h2>

        <form th:action="@{/register}" th:object="${registerDto}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}">
                <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}">
                <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}">
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}">
                <div class="error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="form-group">
                <label for="role">I want to...</label>
                <select id="role" th:field="*{role}">
                    <option value="GUEST">Book rooms (Guest)</option>
                    <option value="HOST">List my own rooms (Host)</option>
                </select>
                <div class="error-text" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
        </form>

        <p style="margin-top:1rem;font-size:0.9rem">
            Already have an account? <a th:href="@{/login}">Login</a>
        </p>
    </div>
</div>
</body>
</html>
