<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — StayEasy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="form-card">
        <h2>Login</h2>

        <div class="alert alert-error" th:if="${param.error}">
            Invalid username or password.
        </div>
        <div class="alert alert-success" th:if="${param.registered}">
            Account created! You can log in now.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
        </form>
        <p style="margin-top:1rem;font-size:0.9rem">
            Don't have an account? <a th:href="@{/register}">Sign up</a>
        </p>
    </div>
</div>
</body>
</html>
